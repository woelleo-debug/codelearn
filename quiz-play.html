<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CodeLearn Quiz spielen - Punkte, Timer, XP und sofortiges Feedback.">
  <title>Quiz Spielen - CodeLearn</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="animations.css">
  <link rel="stylesheet" href="quiz-editor.css">
</head>
<body data-quiz-page="play">
<div id="progress-bar"></div>
<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">⚡ Code<span>Learn</span></a>
    <div class="nav-links">
      <a href="quiz.html">← Quiz Menü</a>
      <a href="projekte.html#code-editor">Code Editor</a>
    </div>
    <div class="nav-actions">
      <button class="hamburger" aria-label="Menü öffnen"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<div class="mobile-menu">
  <a href="quiz.html">Quiz Menü</a>
  <a href="projekte.html#code-editor">Code Editor</a>
</div>

<main class="quiz-shell">
  <section class="quiz-panel reveal">
    <div id="quiz-play-area">
      <div class="quiz-hud">
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
          <span class="badge badge-cyan" id="quiz-mode-label">Normal</span>
          <span class="badge badge-purple" id="quiz-filter-label">Alle Themen</span>
          <span class="badge badge-orange" id="quiz-difficulty">leicht</span>
        </div>
        <div class="quiz-stats-strip" style="margin:0;">
          <span class="quiz-stat-pill">Punkte: <strong id="quiz-score">0</strong></span>
          <span class="quiz-stat-pill">Richtig: <strong id="quiz-correct">0/0</strong></span>
          <span class="quiz-stat-pill" id="quiz-timer-wrap" style="display:none;">Timer: <strong id="quiz-timer">30s</strong></span>
        </div>
      </div>

      <div class="quiz-meter" aria-label="Quiz Fortschritt">
        <span id="quiz-progress-fill"></span>
      </div>
      <div style="display:flex; justify-content:space-between; gap:1rem; color:var(--text-muted); font-size:0.9rem; margin-bottom:1rem;">
        <span id="quiz-question-number">Frage 1 von 15</span>
        <span id="quiz-category">Kategorie</span>
        <span id="quiz-progress-text">0%</span>
      </div>

      <article class="quiz-question-card">
        <div class="quiz-question-text" id="quiz-question-text">Frage wird geladen...</div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="quiz-explanation" id="quiz-explanation"></div>
      </article>

      <div class="quiz-actions">
        <button class="btn btn-secondary" id="quiz-prev" type="button">← Zurück</button>
        <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
          <button class="btn btn-secondary" id="quiz-next" type="button">Weiter →</button>
          <button class="btn btn-primary" id="quiz-finish" type="button">Quiz beenden</button>
        </div>
      </div>
    </div>

    <div id="quiz-results" style="display:none; text-align:center;">
      <h1><span class="gradient-text">Ergebnis</span></h1>
      <div class="quiz-score-number" id="result-score">0%</div>
      <p id="result-message">Gut gemacht.</p>
      <div class="quiz-result-grid">
        <div class="quiz-result-tile"><strong id="result-correct">0/0</strong><span>Richtig</span></div>
        <div class="quiz-result-tile"><strong id="result-points">0</strong><span>Punkte</span></div>
        <div class="quiz-result-tile"><strong id="result-xp">+0</strong><span>XP</span></div>
        <div class="quiz-result-tile"><strong id="result-level">Level 1</strong><span>Fortschritt</span></div>
      </div>
      <div class="quiz-actions" style="justify-content:center;">
        <button class="btn btn-primary" id="quiz-restart" type="button">Neustarten</button>
        <button class="btn btn-secondary" id="quiz-new" type="button">Neues Quiz</button>
      </div>
    </div>
  </section>
</main>

<footer class="footer" role="contentinfo">
  <div class="footer-container">
    <div class="footer-bottom">
      <p>© 2024 CodeLearn. Dein Fortschritt wird lokal gespeichert.</p>
    </div>
  </div>
</footer>

<button id="scroll-top" aria-label="Nach oben scrollen">↑</button>
<script src="main.js"></script>
<script src="quiz-app.js"></script>
</body>
</html>
